<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidhyaSree Devaraju | Senior Systems Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010409; --panel: rgba(13, 17, 23, 0.95); }
        body { background: var(--bg); color: #f0f6fc; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .glass { background: var(--panel); backdrop-filter: blur(20px); border: 1px solid rgba(48, 54, 61, 0.8); }
        .tag { font-size: 0.6rem; color: var(--neon); font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }
        .project-card { border-left: 3px solid var(--neon); padding-left: 2rem; margin-bottom: 6rem; position: relative; }
        .tech-pill { border: 1px solid rgba(0, 242, 255, 0.2); padding: 3px 10px; font-size: 9px; font-weight: 700; color: var(--neon); text-transform: uppercase; margin-right: 5px; display: inline-block; margin-bottom: 5px; }
        .bullet-list li { position: relative; padding-left: 1.5rem; margin-bottom: 0.5rem; color: #8b949e; font-size: 0.85rem; }
        .bullet-list li::before { content: "›"; position: absolute; left: 0; color: var(--neon); font-weight: bold; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav class="fixed w-full z-50 glass py-4 px-6 md:px-10 border-b border-white/10">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="font-bold text-sm md:text-lg" style="font-family: 'Syncopate';">VIDHYA_SREE<span class="text-cyan-400">.ARCH</span></div>
            <div class="flex gap-8 uppercase text-[10px] font-bold tracking-widest">
                <span onclick="app.route('home')" class="cursor-pointer hover:text-cyan-400 transition-colors">01_ROOT</span>
                <span onclick="app.route('exp')" class="cursor-pointer hover:text-cyan-400 transition-colors">02_EXPERIENCE</span>
                <span onclick="app.route('labs')" class="cursor-pointer hover:text-cyan-400 transition-colors">03_LABS</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        
        <section id="sec-home" class="active">
            <header class="mb-24">
                <span class="tag block mb-4">// SESSION_INIT_2026</span>
                <h1 class="text-6xl md:text-8xl font-bold mb-6 uppercase" style="font-family: 'Syncopate';">SYSTEMS<br>ARCHITECT</h1>
                <p class="text-slate-400 text-xl font-light max-w-2xl">Specializing in Microsoft ecosystem resilience, high-scale distributed data, and automated reliability engineering.</p>
            </header>
            <div class="glass p-6 font-mono text-[11px] border-cyan-400/20"><div id="console-logs"></div></div>
        </section>

        <section id="sec-exp">
            <h2 class="text-2xl font-bold mb-16 uppercase" style="font-family: 'Syncopate';">Technical_Portfolio</h2>
            <div id="experience-render"></div>
        </section>

        <section id="sec-labs">
            <h2 class="text-2xl font-bold mb-16 uppercase" style="font-family: 'Syncopate';">AI_Labs_&_Pubs</h2>
            <div id="labs-render" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </section>

    </main>

    <script>
        /**
         * CONTENT DATA OBJECT
         * This is where you add your professional descriptions.
         */
        const portfolioData = {
            experience: [
                {
                    title: "Azure SQL DB Capacity Management",
                    meta: "Microsoft | Jan 2022 — Present",
                    tech: ["Kusto", "XTS", "PowerShell", "Service Fabric", "Power BI"],
                    description: "Global Data Utilization Analysis focused on ensuring Minimal Utilization Percentage across worldwide regions to prevent hot segments and optimize cloud resources.",
                    points: [
                        "End-to-end Power BI incident tracing using complex DAX and Kusto joins.",
                        "Orchestrated node re-size operations and data-driven capacity requests.",
                        "Automated telemetry audits via PowerShell and XTS for efficiency optimization."
                    ]
                },
                {
                    title: "Azure Cosmos DB",
                    meta: "Microsoft | 2019 — 2021",
                    tech: ["Azure Functions", "Cosmos DB", "MS Flow", "AAD Token"],
                    description: "Scaling throughput and storage across global geographic regions for high-availability worldwide applications.",
                    modules: [
                        { name: "Dashboard", items: ["Calculated total Azure Spend for subscriptions.", "Integrated AAD Token for secure environment access.", "Created Azure Functions and automated deployment."] },
                        { name: "Engineering Systems", items: ["End-to-end incident tracing via Kusto joins.", "Automated IcM creation for pipeline failures.", "Schema preparation and SQL joins from Excel to Stored Procedures."] }
                    ]
                },
                {
                    title: "WATS Event Portal",
                    meta: "Washington Telugu Samithi | Internal",
                    tech: [".NET MVC 4.0", "EF6", "SQL 2012", "Bootstrap"],
                    description: "Full-stack event management and ticketing system with secure user-identity management.",
                    points: [
                        "Built Admin and User views for operational management.",
                        "Migrated logic from Excel datasets to SQL Stored Procedures and complex joins.",
                        "Designed responsive UIs using HTML5, jQuery, and CSS3."
                    ]
                }
            ],
            labs: [
                { title: "Predictive Resilience Agent", tech: "Azure OpenAI / Python", desc: "Automating TSG generation using Kusto telemetry spikes." },
                { title: "Fabric Scaling Docs", tech: "DP-600 / Fabric", desc: "Whitepaper on high-availability design for Microsoft Fabric." }
            ]
        };

        const app = {
            init: () => {
                app.renderExp();
                app.renderLabs();
                app.initThree();
                app.typewriter();
            },
            route: (target) => {
                document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
                document.getElementById('sec-' + target).classList.add('active');
                window.scrollTo(0,0);
            },
            renderExp: () => {
                document.getElementById('experience-render').innerHTML = portfolioData.experience.map(item => `
                    <div class="project-card">
                        <h3 class="text-3xl font-bold uppercase mb-2" style="font-family: 'Syncopate';">${item.title}</h3>
                        <span class="tag opacity-50 block mb-6">${item.meta}</span>
                        <div class="mb-6">${item.tech.map(t => `<span class="tech-pill">${t}</span>`).join('')}</div>
                        <p class="text-slate-300 text-sm mb-6">${item.description}</p>
                        ${item.points ? `<ul class="bullet-list">${item.points.map(p => `<li>${p}</li>`).join('')}</ul>` : ''}
                        ${item.modules ? item.modules.map(mod => `
                            <details class="glass mt-4"><summary class="text-cyan-400 font-bold p-4 uppercase text-xs">${mod.name}</summary>
                            <ul class="bullet-list">${mod.items.map(mi => `<li>${mi}</li>`).join('')}</ul></details>
                        `).join('') : ''}
                    </div>
                `).join('');
            },
            renderLabs: () => {
                document.getElementById('labs-render').innerHTML = portfolioData.labs.map(l => `
                    <div class="glass p-8 border-l-2 border-cyan-400">
                        <span class="tag text-cyan-400 block mb-4">Node_Update</span>
                        <h4 class="text-xl font-bold mb-2">${l.title}</h4>
                        <p class="text-slate-400 text-sm mb-4">${l.desc}</p>
                        <span class="text-[10px] font-mono text-cyan-200 opacity-50">${l.tech}</span>
                    </div>
                `).join('');
            },
            typewriter: () => {
                const logs = ["> Booting v2.0.7...", "> Loading System Architecture Projects...", "> [OK] Telemetry Linked.", "> READY."];
                let i=0; const el = document.getElementById("console-logs");
                const run = () => { if(i < logs.length) { el.innerHTML += logs[i] + "<br>"; i++; setTimeout(run, 500); } };
                run();
            },
            initThree: () => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                const starGeo = new THREE.BufferGeometry();
                const starPos = [];
                for(let k=0; k<1500; k++) starPos.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
                starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
                const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 1.2 }));
                scene.add(stars); camera.position.z = 800;
                const animate = () => { requestAnimationFrame(animate); stars.rotation.y += 0.0005; renderer.render(scene, camera); };
                animate();
            }
        };

        window.onload = app.init;
    </script>
</body>
</html>
