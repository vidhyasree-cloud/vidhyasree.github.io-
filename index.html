<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidhyaSree | Architecture Node v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010409; --panel: rgba(13, 17, 23, 0.98); }
        body { background: var(--bg); color: #f0f6fc; font-family: 'Space Grotesk', sans-serif; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .glass { background: var(--panel); border: 1px solid #30363d; border-radius: 4px; }
        .active-nav { color: var(--neon); border-bottom: 2px solid var(--neon); }
        .tech-pill { border: 1px solid rgba(0, 242, 255, 0.2); padding: 2px 8px; font-size: 10px; color: var(--neon); font-family: monospace; text-transform: uppercase; }
        .bullet-list li { position: relative; padding-left: 1.2rem; margin-bottom: 0.5rem; color: #8b949e; font-size: 0.85rem; }
        .bullet-list li::before { content: "›"; position: absolute; left: 0; color: var(--neon); font-weight: bold; }
        section { display: none; min-height: 80vh; }
        section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .page-btn { border: 1px solid #30363d; padding: 4px 12px; font-family: monospace; cursor: pointer; transition: 0.2s; }
        .page-btn.active { background: var(--neon); color: #000; font-weight: bold; }
        details summary { cursor: pointer; color: var(--neon); font-size: 0.8rem; font-weight: bold; margin-top: 1rem; list-style: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav class="fixed w-full z-50 glass py-4 px-6">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="font-bold text-sm" style="font-family: 'Syncopate';">VIDHYA_SREE<span class="text-cyan-400">.7Y</span></div>
            <div class="flex gap-6 text-[9px] font-bold tracking-widest">
                <button onclick="app.router('exp', event)" class="nav-btn active-nav">01_EXPERIENCE</button>
                <button onclick="app.router('sys', event)" class="nav-btn">02_SYS_DESIGN</button>
                <button onclick="app.router('pub', event)" class="nav-btn">03_PUBLICATIONS</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        
        <section id="exp" class="active">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-4">
                <h2 class="text-2xl font-bold uppercase" style="font-family: 'Syncopate';">System_History</h2>
                <div id="exp-pagination" class="flex gap-2"></div>
            </div>
            <div id="exp-container" class="space-y-12"></div>
        </section>

        <section id="sys">
            <h2 class="text-2xl font-bold uppercase mb-12" style="font-family: 'Syncopate';">Architectural_Specs</h2>
            <div id="sys-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass p-8 border-l-2 border-cyan-400">
                    <span class="tech-pill">Drafting</span>
                    <h3 class="text-xl font-bold mt-4 mb-4">High-Scale Data Ingestion</h3>
                    <p class="text-slate-400 text-sm">Working on patterns for resilience in multi-region Fabric deployments...</p>
                </div>
            </div>
        </section>

        <section id="pub">
            <h2 class="text-2xl font-bold uppercase mb-12" style="font-family: 'Syncopate';">Published_Artifacts</h2>
            <div id="pub-container" class="space-y-4"></div>
        </section>

    </main>

    <script>
        const portfolioData = {
            experience: [
                {
                    title: "Azure SQL DB Capacity Management",
                    org: "Microsoft (via Quadrant) | Jan 2022 — Present",
                    tech: ["Kusto", "XTS", "PowerShell", "Service Fabric", "Power BI"],
                    summary: "Focuses on Data Analysis and Utilization in worldwide regions to ensure Minimal Utilization and avoid hot segments.",
                    details: [
                        "Regularly analyze data to identify areas requiring attention.",
                        "Perform periodic analysis to maintain minimal Utilization Percentage.",
                        "Request capacity based on data-driven triggers.",
                        "Successfully handled Node Re-size operations and migrations."
                    ]
                },
                {
                    title: "Azure Cosmos DB",
                    org: "Microsoft (Offshore) | Dec 2019 — Sept 2021",
                    tech: ["Azure Functions", "Cosmos DB", "MS Flow", "Moq", "VSTS"],
                    summary: "Globally distributed database service. Developed modules for cost tracking and engineering systems.",
                    details: [
                        "Module I: Developed subscription spend calculation for environments.",
                        "Integrated AAD Tokens for secure environment access.",
                        "Engineered MS-Flows for notification triggers on azure cost/exceptions.",
                        "Module II: Created PowerShell scripts for disk clean ups and Windows updates in Scale Sets.",
                        "Managed build and test phase pipelines in Engineering Systems."
                    ]
                },
                {
                    title: "WATS Portal",
                    org: "Washington Telugu Samithi // Event Management",
                    tech: [".NET MVC 4.0", "EF6", "Bootstrap", "LINQ", "SQL 2012", "PayPal API"],
                    summary: "Robust Event Management System streamlining organization and ticketing with secure PayPal integration.",
                    details: [
                        "Orchestrated project lifecycles within Agile/Scrum framework.",
                        "Architected responsive UIs using HTML5, jQuery, and CSS3.",
                        "Developed optimized Stored Procedures for high-efficiency CRUD.",
                        "Integrated PayPal API for real-time ticket transactions."
                    ]
                },
                {
                    title: "Office Management Portal",
                    org: "Internal Project // Performance Tracking",
                    tech: [".NET MVC 4.0", "EF6", "SQL 2012", "PayPal API"],
                    summary: "Application to track performance, attendance, and task assignment with email integration.",
                    details: [
                        "Engineered end-to-end applications using C# and ASP.NET MVC.",
                        "Developed a high-performance Seat Booking Engine.",
                        "Implemented advanced server-side Pagination and data filtering.",
                        "Optimized backend performance with complex T-SQL and SQL joins."
                    ]
                },
                {
                    title: "SRK Travels",
                    org: "Logistics & Tour Automation",
                    tech: ["ASP.NET MVC", "EF6", "LINQ to SQL", "PayPal Integration"],
                    summary: "Automated manual transport solutions and ticket booking systems.",
                    details: [
                        "Architected Seat Booking Engine using LINQ and EF6.",
                        "Integrated secure Payment Gateway APIs (PayPal).",
                        "Modeled normalized database schemas for enterprise scalability."
                    ]
                },
                {
                    title: "AI Resilience Agent (NEW)",
                    org: "New AI Project // 2026",
                    tech: ["Python", "Azure OpenAI", "KQL", "Fabric"],
                    summary: "Predictive analysis tool for system reliability and automated TSG generation.",
                    details: [
                        "Utilizing LLMs to analyze Kusto logs for early failure detection.",
                        "Automating incident response documentation based on historical telemetry."
                    ]
                }
            ],
            publications: [
                { title: "Managing Global SQL Capacity at Scale", date: "2025", link: "#" },
                { title: "SRE Resilience in Microsoft Ecosystems", date: "2024", link: "#" }
            ]
        };

        const app = {
            state: { page: 1, itemsPerPage: 1 },

            init: () => {
                app.renderExp();
                app.renderPub();
                app.initThree();
            },

            router: (id, e) => {
                document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
                e.target.classList.add('active-nav');
            },

            renderExp: () => {
                const container = document.getElementById('exp-container');
                const paginator = document.getElementById('exp-pagination');
                const start = (app.state.page - 1) * app.state.itemsPerPage;
                const items = portfolioData.experience.slice(start, start + app.state.itemsPerPage);

                container.innerHTML = items.map(item => `
                    <div class="project-card border-l-2 border-cyan-400 pl-8">
                        <h3 class="text-3xl font-bold mb-2 uppercase" style="font-family: 'Syncopate';">${item.title}</h3>
                        <span class="text-cyan-400 text-[10px] font-bold tracking-widest block mb-6">${item.org}</span>
                        <div class="flex flex-wrap gap-2 mb-8">${item.tech.map(t => `<span class="tech-pill">${t}</span>`).join('')}</div>
                        <p class="text-slate-300 text-base leading-relaxed mb-8 max-w-4xl">${item.summary}</p>
                        <div class="glass p-8">
                            <ul class="bullet-list">${item.details.map(d => `<li>${d}</li>`).join('')}</ul>
                        </div>
                    </div>
                `).join('');

                const totalPages = Math.ceil(portfolioData.experience.length / app.state.itemsPerPage);
                paginator.innerHTML = Array.from({length: totalPages}, (_, i) => `
                    <button onclick="app.setPage(${i+1})" class="page-btn ${app.state.page === i+1 ? 'active' : ''}">${(i+1).toString().padStart(2, '0')}</button>
                `).join('');
            },

            setPage: (p) => {
                app.state.page = p;
                app.renderExp();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            renderPub: () => {
                document.getElementById('pub-container').innerHTML = portfolioData.publications.map(p => `
                    <div class="glass p-6 flex justify-between items-center group hover:border-cyan-400 transition-all cursor-pointer">
                        <h4 class="font-bold text-sm group-hover:text-cyan-400">${p.title}</h4>
                        <span class="text-[10px] opacity-50 font-mono">${p.date} // VIEW_PDF</span>
                    </div>
                `).join('');
            },

            initThree: () => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                const starGeo = new THREE.BufferGeometry();
                const starPos = [];
                for(let k=0; k<2000; k++) starPos.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
                starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
                const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 1.2 }));
                scene.add(stars); camera.position.z = 800;
                function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.0005; renderer.render(scene, camera); }
                animate();
            }
        };

        window.onload = app.init;
    </script>
</body>
</html>
